<div class="min-h-screen bg-slate-950 flex items-center justify-center p-4">
    <div class="bg-slate-900 p-8 rounded-2xl shadow-2xl w-full max-w-md border border-slate-800">
        
        <h2 class="text-3xl font-bold text-center text-slate-100 mb-2">Agenda App</h2>
        <p class="text-sm text-center text-slate-400 mb-8">Ingresa tus credenciales para acceder</p>
        
        <div *ngIf="errorMessage" class="bg-red-950/40 text-red-400 p-3.5 rounded-xl text-sm mb-6 border border-red-900/50 font-medium">
            {{ errorMessage }}
        </div>

        <form (ngSubmit)="alEnviarFormulario()" #miForm="ngForm" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-slate-300 mb-2">Correo Electrónico</label>
                <input type="email" name="email" [(ngModel)]="credentials.email" required placeholder="ejemplo@correo.com"
                    class="w-full px-4 py-3 rounded-xl border border-slate-700 bg-slate-800 text-slate-100 placeholder:text-slate-500 focus:outline-none focus:ring-2 focus:ring-emerald-500/20 focus:border-emerald-500 transition-all">
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-300 mb-2">Contraseña</label>
                <input type="password" name="password" [(ngModel)]="credentials.password" required placeholder="••••••••"
                    class="w-full px-4 py-3 rounded-xl border border-slate-700 bg-slate-800 text-slate-100 placeholder:text-slate-500 focus:outline-none focus:ring-2 focus:ring-emerald-500/20 focus:border-emerald-500 transition-all">
            </div>

            <button type="submit" [disabled]="!miForm.valid"
                    class="w-full bg-emerald-600 hover:bg-emerald-500 text-slate-950 font-bold py-3.5 rounded-xl transition-all shadow-lg shadow-emerald-950/20 disabled:opacity-30 disabled:cursor-not-allowed transform active:scale-[0.99]">
                Ingresar al Sistema
            </button>
        </form>

    </div>
</div>
